name: Build and Deploy to GCP

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: us-central1
  BACKEND_SERVICE: panelmind-core-api
  FRONTEND_SERVICE: panelmind-web
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Google Auth
      id: auth
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: Docker Auth
      run: |-
        gcloud auth configure-docker "${{ env.GAR_LOCATION }}-docker.pkg.dev"

    # BUILD AND PUSH BACKEND
    - name: Build and Push Backend
      working-directory: ./backend
      run: |-
        docker build -t "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/panelmind-repo/${{ env.BACKEND_SERVICE }}:${{ github.sha }}" .
        docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/panelmind-repo/${{ env.BACKEND_SERVICE }}:${{ github.sha }}"

    - name: Deploy Backend to Cloud Run
      id: deploy-backend
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ${{ env.BACKEND_SERVICE }}
        region: ${{ env.REGION }}
        image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/panelmind-repo/${{ env.BACKEND_SERVICE }}:${{ github.sha }}

    # BUILD AND PUSH FRONTEND
    - name: Build and Push Frontend
      working-directory: ./frontend
      run: |-
        docker build -t "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/panelmind-repo/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}" .
        docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/panelmind-repo/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}"

    - name: Deploy Frontend to Cloud Run
      id: deploy-frontend
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ${{ env.FRONTEND_SERVICE }}
        region: ${{ env.REGION }}
        image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/panelmind-repo/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}
        flags: '--allow-unauthenticated'

    - name: Show Outputs
      run: |-
        echo "Backend URL: ${{ steps.deploy-backend.outputs.url }}"
        echo "Frontend URL: ${{ steps.deploy-frontend.outputs.url }}"
